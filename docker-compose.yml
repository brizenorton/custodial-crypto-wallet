services:
  postgres:
    image: postgres:16-alpine
    container_name: custodial_crypto_wallet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: custodial_crypto_wallet_db
      POSTGRES_USER: payment_admin
      POSTGRES_PASSWORD: "!VerySecretPass!*^"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./DDL/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./DDL/create_indexes.sql:/docker-entrypoint-initdb.d/02_create_indexes.sql
      - ./DDL/stored_procedures.sql:/docker-entrypoint-initdb.d/03_stored_procedures.sql
      - ./DDL/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_admin -d custodial_crypto_wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
